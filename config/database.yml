# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
#
# Configure Using Gemfile
#   gem "pg"
#
# Single unified database per environment: application data plus Solid Queue
# and Solid Cache tables all live in one schema (see db/schema.rb).
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: comunidad_antesis_development

test:
  <<: *default
  database: comunidad_antesis_test

production:
  <<: *default
  database: comunidad_antesis_production
  username: comunidad_antesis
  password: <%= ENV["COMUNIDAD_ANTESIS_DATABASE_PASSWORD"] %>
